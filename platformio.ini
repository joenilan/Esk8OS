[platformio]
default_envs = tdisplay_s3_debug_usb

; ============================================================================
; LovyanGFX render branch. The display config (bus pins, panel offsets, etc.)
; now lives in src/LGFX_Config.h instead of TFT_eSPI build flags, because
; LovyanGFX is configured in code. LovyanGFX drives the ESP32-S3 LCD_CAM
; peripheral with DMA, which TFT_eSPI cannot do in 8-bit parallel mode.
; ============================================================================

[env:tdisplay_s3_base]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino

; Stamp src/version.h from version.txt + git state before each build.
extra_scripts = pre:scripts/gen_version.py

; Serial console (ride-log management / diagnostics — see console.cpp).
monitor_speed = 115200
monitor_echo = yes

; Memory Unlock Flags for ESP32-S3R8
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    https://github.com/SolidGeek/VescUart.git
    h2zero/NimBLE-Arduino @ ^1.4.0
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DBOARD_HAS_PSRAM
    -DLGFX_USE_V1
    -DBLE_BRIDGE_ENABLED

[env:tdisplay_s3_debug_usb]
extends = env:tdisplay_s3_base
build_flags =
    ${env:tdisplay_s3_base.build_flags}
    -DESK8OS_BOARD_TDISPLAY_S3=1
    -DESK8OS_HAS_TOUCH=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:tdisplay_s3_ride_release]
extends = env:tdisplay_s3_base
build_flags =
    ${env:tdisplay_s3_base.build_flags}
    -DESK8OS_BOARD_TDISPLAY_S3=1
    -DESK8OS_HAS_TOUCH=0
    -DARDUINO_USB_MODE=1
    -UARDUINO_USB_CDC_ON_BOOT

[env:tdisplay_s3_touch_debug]
extends = env:tdisplay_s3_base
build_flags =
    ${env:tdisplay_s3_base.build_flags}
    -DESK8OS_BOARD_TDISPLAY_S3=1
    -DESK8OS_HAS_TOUCH=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:tdisplay_s3_touch_ride]
extends = env:tdisplay_s3_base
build_flags =
    ${env:tdisplay_s3_base.build_flags}
    -DESK8OS_BOARD_TDISPLAY_S3=1
    -DESK8OS_HAS_TOUCH=1
    -DARDUINO_USB_MODE=1
    -UARDUINO_USB_CDC_ON_BOOT

[env:wokwi-simulator]
platform = espressif32
board = esp32dev
framework = arduino

; Stamp src/version.h from version.txt + git state before each build.
extra_scripts = pre:scripts/gen_version.py

monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0

build_flags =
    -D LGFX_USE_V1
    -D WOKWI_SIMULATION=1
